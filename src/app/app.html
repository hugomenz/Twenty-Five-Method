<main class="practice-shell">
  <section class="practice-layout" aria-label="Practice counter">
    <header class="top-bar">
      <p class="brand-mark">M-25</p>
      <img
        class="brand-logo"
        ngSrc="25.png"
        width="56"
        height="56"
        alt=""
        priority
      />
    </header>

    <section class="counter-panel">
      <output class="counter-value" aria-live="polite">{{ count() }}</output>

      <div class="status-stack">
        @if (isComplete()) {
          <p class="status-message" aria-live="polite">We did it.</p>
        } @else {
          <p class="status-spacer" aria-hidden="true"></p>
        }

        <p class="goal-label">Goal: 25</p>

        <button
          class="reset-button"
          type="button"
          (click)="reset()"
          aria-label="Reset counter"
        >
          <span class="reset-icon" aria-hidden="true">↺</span>
        </button>
      </div>
    </section>

    <button
      class="control-button control-button--decrement"
      type="button"
      (click)="decrement()"
      aria-label="Subtract one"
    >
      −
    </button>

    <button
      class="control-button control-button--increment"
      type="button"
      (click)="increment()"
      [disabled]="!canIncrement()"
      aria-label="Add one"
    >
      +
    </button>
  </section>
</main>
