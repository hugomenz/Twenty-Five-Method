<div class="practice-view">
	<output class="counter-value" aria-live="polite" data-testid="m25-count">{{ countLabel() }}</output>
	<p class="detail-text">{{ targetLabel() }}</p>
	@if (state.m25Completed()) {
		<p class="status-message" aria-live="polite">{{ dictionary().status.passageCompleted }}</p>
	} @else {
		<p class="status-spacer" aria-hidden="true"></p>
	}
</div>
