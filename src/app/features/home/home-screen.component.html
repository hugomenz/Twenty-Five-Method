<section class="home-screen">
	<div class="mode-grid">
		<button class="mode-card mode-card--m25" type="button" (click)="state.openPractice('m25')">
			<p class="mode-card__label">{{ dictionary().modes.m25 }}</p>
		</button>

		<button class="mode-card mode-card--rhythms" type="button" (click)="state.openPractice('rhythms')">
			<p class="mode-card__label">{{ dictionary().modes.rhythms }}</p>
		</button>
	</div>

	<div class="studio-panel">
		<div class="studio-panel__actions">
			<button class="studio-link" type="button" (click)="state.openRoutineStudio()">
				{{ dictionary().actions.prepareRoutine }}
			</button>
			<button class="studio-link" type="button" (click)="state.openPatternStudio()">
				{{ dictionary().actions.buildRhythm }}
			</button>
		</div>
	</div>
</section>
