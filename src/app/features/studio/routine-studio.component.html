<section class="studio-screen">
	<p class="studio-kicker">{{ dictionary().sections.routines }}</p>
	<h1 class="studio-title">{{ title() }}</h1>
	<p class="studio-copy">{{ description() }}</p>
	<button class="studio-launch" type="button" (click)="state.startRhythmPracticeFromDraft()" [disabled]="state.routineDraftItems().length === 0">
		{{ dictionary().actions.startCurrentRoutine }}
	</button>
	<m25-routine-editor-section />
</section>
