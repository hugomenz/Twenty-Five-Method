<dialog class="settings-sheet" open [attr.aria-label]="dictionary().app.settingsTitle">
	<div class="sheet-header">
		<p class="sheet-title">{{ dictionary().app.name }}</p>
		<button
			class="sheet-close"
			type="button"
			(click)="requestClose.emit()"
			[attr.aria-label]="dictionary().aria.closeSettings"
		>
			✕
		</button>
	</div>

	<m25-appearance-settings-section />
	@if (state.currentMode() === 'm25') {
		<m25-m25-settings-section (requestReset)="requestReset.emit()" />
	} @else {
		<m25-rhythm-settings-section (requestReset)="requestReset.emit()" />
	}
</dialog>
