<dialog
	#dialogEl
	class="settings-sheet"
	[attr.aria-label]="dictionary().app.settingsTitle"
	(close)="requestClose.emit()"
	(click)="onDialogClick($event)"
>
	<div class="sheet-header">
		<p class="sheet-title">{{ dictionary().app.settingsTitle }}</p>
		<button
			class="sheet-close"
			type="button"
			(click)="close()"
			[attr.aria-label]="dictionary().aria.closeSettings"
		>
			✕
		</button>
	</div>

	<div class="sheet-body">
		<m25-appearance-settings-section />
		@if (settingsContext() === 'm25') {
			<m25-m25-settings-section (requestReset)="requestReset.emit()" />
		} @else if (settingsContext() === 'rhythms') {
			<m25-rhythm-settings-section (requestReset)="requestReset.emit()" />
		}
	</div>
</dialog>
