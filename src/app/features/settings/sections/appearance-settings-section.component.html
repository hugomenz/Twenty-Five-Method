<section class="sheet-section">
	<h2>{{ dictionary().sections.general }}</h2>
	<label class="field">
		<span>{{ dictionary().fields.language }}</span>
		<select [value]="state.settings().language" (change)="onLanguageChange($event)">
			@for (language of languages; track language) {
				<option [value]="language">{{ dictionary().options.language[language] }}</option>
			}
		</select>
	</label>
	<label class="field">
		<span>{{ dictionary().fields.theme }}</span>
		<select [value]="state.settings().theme" (change)="onThemeChange($event)">
			@for (theme of themes; track theme) {
				<option [value]="theme">{{ dictionary().options.theme[theme] }}</option>
			}
		</select>
	</label>
	<label class="field">
		<span>{{ dictionary().fields.buttonTone }}</span>
		<select [value]="state.settings().buttonTone" (change)="onButtonToneChange($event)">
			@for (buttonTone of buttonTones; track buttonTone) {
				<option [value]="buttonTone">{{ dictionary().options.buttonTone[buttonTone] }}</option>
			}
		</select>
	</label>
	<label class="field">
		<span>{{ dictionary().fields.buttonShape }}</span>
		<select [value]="state.settings().buttonShape" (change)="onButtonShapeChange($event)">
			@for (buttonShape of buttonShapes; track buttonShape) {
				<option [value]="buttonShape">{{ dictionary().options.buttonShape[buttonShape] }}</option>
			}
		</select>
	</label>
	<label class="field field--toggle">
		<span>{{ dictionary().fields.askTitleBeforeStart }}</span>
		<input type="checkbox" [checked]="state.settings().askTitleBeforeStart" (change)="onAskTitleChange($event)" />
	</label>
	<label class="field field--toggle">
		<span>{{ dictionary().fields.askBpmBeforeStart }}</span>
		<input type="checkbox" [checked]="state.settings().askBpmBeforeStart" (change)="onAskBpmChange($event)" />
	</label>
	<label class="field">
		<span>{{ dictionary().fields.practiceTitle }}</span>
		<input type="text" [value]="state.settings().defaultPracticeTitle" (input)="onDefaultTitleInput($event)" />
	</label>
	<label class="field">
		<span>{{ dictionary().fields.practiceBpm }}</span>
		<input type="number" min="1" [value]="state.settings().defaultBpm ?? ''" (input)="onDefaultBpmInput($event)" />
	</label>
</section>
