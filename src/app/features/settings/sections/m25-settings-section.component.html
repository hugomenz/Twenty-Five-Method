<section class="sheet-section">
	<h2>{{ dictionary().sections.m25 }}</h2>
	<label class="field">
		<span>{{ dictionary().fields.target }}</span>
		<input type="number" min="1" [value]="state.settings().target" (input)="onTargetInput($event)" />
	</label>
	<label class="field field--toggle">
		<span>{{ dictionary().fields.allowNegative }}</span>
		<input type="checkbox" [checked]="state.settings().allowNegative" (change)="onAllowNegativeChange($event)" />
	</label>
	<label class="field">
		<span>{{ dictionary().fields.minusAction }}</span>
		<select [value]="state.settings().m25ErrorBehavior" (change)="onErrorBehaviorChange($event)">
			@for (errorBehavior of errorBehaviors; track errorBehavior) {
				<option [value]="errorBehavior">{{ dictionary().options.errorBehavior[errorBehavior] }}</option>
			}
		</select>
	</label>
	<button class="sheet-action sheet-action--muted" type="button" (click)="requestReset.emit()">
		{{ dictionary().actions.resetPractice }}
	</button>
</section>
